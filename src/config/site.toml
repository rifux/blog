[config.site]
title = "rifux ᗜᴗᗜ"
description = "A personal publication space and systems lounge."
pageTitle = "rifux | My personal blog! ᗜᴗᗜ"
pageDescription = "A calm personal publication space for notes, automation, and writing."
url = "https://rifux.dev"
repository = "https://github.com/rifux/blog"
footerNote = "Articles from a dreaming researcher!"

[config.theme]
# Available color palettes：
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "purple-soft"

[config.fonts]
# English and code-style UI fonts
en = "Maple Mono"
code = "Monaco"
# Directly selectable in the template: ChillRoundM, LXGW WenKai
# Chinese reading font
zh = "ChillRoundM"
# Complete Chinese font file path
file = "/fonts/ChillRoundM.ttf"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.math]
render = "katex" # "katex" | "mathjax"

[config.comments]
enabled = false
provider = "none"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.pages.blog]
title = "Lore"
kicker = "The Great Archive"
subtitle = "Chronicles of a dreaming researcher."
note = "Scribbled thoughts, system deep-dives, and technical spells arranged for a slow, yet quiet reading."
postsPerPage = 8
# Date format template used by date-fns.
dateFormat = "yyyy-MM-dd"
# Meta information separator. Can use symbols like "|", "/", or the special value "icon".
metadataSeparator = "icon"
# Article list cover image style: "card" keeps the bordered thumbnail,
# "mask" blends the image into the right side.
coverImageStyle = "mask"

[config.pages.blog.categories]
title = "Categories"
kicker = "Constellations"
subtitle = "A map of recurring magic."
note = "A quiet index of tags and topics, charting different paths of systems automation."

[config.pages.blog.series]
title = "Series"
kicker = "Reading paths"
subtitle = "Chapters of the journey."
note = "Connected notes that can be followed in the order they were written."

[config.pages.projects]
title = "The Forge"
kicker = "Projects"
subtitle = "A compact shelf of grimoires."
note = ""

[config.pages.vibe]
title = "Almanac"
kicker = ""
subtitle = "The Traveler's Ledger"
note = "A chronological timeline tracking physical coordinates, hackathon achievements, and favorite scrolls discovered along the way."
showTrail = true

[config.comments.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "en-US"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "en-US"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "Vladimir Blinkov"
handle = "@rifux"
role = "DevOps Magician"
company = "Independent Studio"
location = "Remote"
email = "contact@rifux.dev"
website = "https://rifux.dev"
github = "https://github.com/rifux/blog"
meta = "Open-source enthusiast"
avatar = "https://avatars.githubusercontent.com/u/87264036?v=4"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
label = "Blog"
href = "/blog"

[[config.topNav.links]]
label = "Projects"
href = "/projects"

[[config.topNav.links]]
label = "Almanac"
href = "/vibe"

[[config.topNav.links]]
label = "About"
href = "/about"

[config.home]

[config.home.quote]
text = [
  "Orchestrate the chaos,",
  "automate the mundane,",
  "and engineer a quiet resilience.",
]
image = "/images/logo-with-name.png"

[config.home.intro]
title = "here is rifux"
name = "rifux"
body = [
  "Nice to meet you! I'm Vladimir Blinkov — a DevOps magician and an advanced tinkerer.",
  "I craft environments through Infrastructure as Code (IaC), adore pipelines and CI/CD.",
  "This space serves as my lounge and a digital workshop, where I worship Kubernetes and align software in the way it works. ᗜᴗᗜ",
]
image = "/images/logo-cat.png"

