[config.site]
title = "navfolio"
description = "A personal navigation portfolio starter built with Astro."
pageTitle = "navfolio | Digital Publication Space"
pageDescription = "A calm AI-native personal publication space for notes, links, and writing."
url = "https://astro.navfolio.site"
repository = "https://github.com/dodolalorc/astro-navfolio"
footerNote = "Released as an open-source starter."

[config.theme]
# Available color palettes：
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "purple-soft"

[config.fonts]
# English and code-style UI fonts
en = "Maple Mono"
code = "Monaco"
# Directly selectable in the template: ChillRoundM, LXGW WenKai
# Chinese reading font
zh = "ChillRoundM"
# Complete Chinese font file path
file = "/fonts/ChillRoundM.ttf"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.math]
render = "katex" # "katex" | "mathjax"

[config.comments]
enabled = false
provider = "none"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.pages.blog]
title = "Writing notes"
kicker = "Notebook archive"
subtitle = "Notes from the margins."
note = "Field notes, drafts, and technical margins arranged for slow browsing."
postsPerPage = 6
# Date format template used by date-fns.
dateFormat = "yyyy-MM-dd"
# Meta information separator. Can use symbols like "|", "/", or the special value "icon".
metadataSeparator = "icon"
# Article list cover image style: "card" keeps the bordered thumbnail,
# "mask" blends the image into the right side.
coverImageStyle = "mask"

[config.pages.blog.categories]
title = "Categories"
kicker = "Browse notes"
subtitle = ""
note = "A quiet index of recurring topics, gathered from article frontmatter."

[config.pages.blog.series]
title = "Series"
kicker = "Reading paths"
subtitle = ""
note = "Connected notes that can be followed in the order they were written."

[config.pages.projects]
title = "Projects"
kicker = "Project shelf"
subtitle = "Small tools and site systems."
note = "A compact shelf for implementation choices, releases, and publishing experiments."

[config.pages.vibe]
title = "vibe"
kicker = ""
subtitle = "Life and coding fragments."
note = "Not formal enough for blog posts, but still part of the story."
showTrail = true

[config.comments.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "navfolio"
handle = "@navfolio"
role = "A Cat Developer"
company = "Independent Studio"
location = "Remote"
email = "hello@navfolio.site"
website = "https://astro.navfolio.site/"
github = "https://github.com/dodolalorc/astro-navfolio"
meta = "Open-source maintainer"
avatar = "/images/logo.png"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
label = "Blog"
href = "/blog"

[[config.topNav.links]]
label = "Projects"
href = "/projects"

[[config.topNav.links]]
label = "Vibe"
href = "/vibe"

[[config.topNav.links]]
label = "About"
href = "/about"

[config.home]

[config.home.quote]
text = [
  "Navigate your world,",
  "Showcase your story,",
  "and keep everything in one place.",
]
image = "/images/logo-with-name.png"

[config.home.intro]
title = "here is navfolio"
name = "navfolio"
body = [
  "The name combines \"Navigation\" and \"Portfolio\".",
  "Navfolio prioritizes lightweight organization, seamless reading, and developer-friendly aesthetics.",
  "It’s less a resume than a personal OS for your ideas, projects, notes, and online presence.",
  "这个名字融合了“导航”与“作品集”。",
  "Navfolio 专注于轻量级组织、流畅的阅读体验，以及对开发者友好的美学设计。",
  "它不像一份简历，更像是一个属于你自己的个人操作系统——承载想法、项目、笔记与网络足迹。",
]
image = "/images/logo-cat.png"

